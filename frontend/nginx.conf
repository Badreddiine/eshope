# =====================================================================
#  Nginx — sert le build Vite (SPA) et relaie l'API vers le backend.
#  "eshop-backend" est le nom de service Docker (réseau eshop-network).
# =====================================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Routage SPA : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy des appels API et authentification vers le backend Spring Boot
    location /api/ {
        proxy_pass http://eshop-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://eshop-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
