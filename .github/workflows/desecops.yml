name: DevSecOps Pipeline – EShop

on:
  push:
    branches: [main]
  pull_request:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Nécessaire pour GitLeaks + SonarQube

      # ── 2. Setup Java ─────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # ── 3. Secret Scan ────────────────────────────────────
      - name: Secret Scan (GitLeaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. SAST (SonarQube) ───────────────────────────────
      - name: SAST (SonarQube)
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ── 5. Build Maven ────────────────────────────────────
      - name: Build JAR
        run: mvn clean package -DskipTests -B

      # ── 6. Build Docker Image ─────────────────────────────
      - name: Build Docker Image
        run: docker build -t eshop:latest .

      # ── 7. Trivy – Scan Image ─────────────────────────────
      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'eshop:latest'
          severity: 'CRITICAL,HIGH'
          format: 'table'
          exit-code: '1'

      # ── 8. Démarrer l'app pour DAST ───────────────────────
      - name: Start Application
        run: |
          docker run -d -p 8080:8080 --name eshop eshop:latest
          sleep 30

      # ── 9. DAST (OWASP ZAP) ───────────────────────────────
      - name: DAST (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          cmd_options: '-a -j -l WARN'
        continue-on-error: true

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-report
          path: zap_baseline_report.html

      # ── 10. OWASP Dependency Check ────────────────────────
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'eshop'
          path: '.'
          format: 'HTML'
        continue-on-error: true

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: reports/dependency-check-report.html

      # ── 11. IaC Scan (prêt pour plus tard) ───────────────
      - name: IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true    # Non bloquant pour l'instant
        continue-on-error: true