# =====================================================================
#  Grafana — provider de dashboards (charge les .json du dossier monté)
# =====================================================================
apiVersion: 1

providers:
  - name: 'eshop'
    orgId: 1
    folder: 'EShop'
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
