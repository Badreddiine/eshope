# =====================================================================
#  Prometheus — configuration de scraping EShop
# =====================================================================
#  - backend  : métriques applicatives Spring Boot Actuator/Micrometer
#               (JVM, HikariCP, http_server_requests, eshop.procedure.*)
#  - cadvisor : métriques conteneurs (CPU/mémoire/réseau)
#  - prometheus : auto-supervision
#
#  "backend" est l'alias réseau du service eshop-backend (docker-compose.yml).
# =====================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'eshop-backend'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'eshop-backend'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
